apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-pvc-deployment
  labels:
    app: nginx-pvc
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-pvc
  template:
    metadata:
      labels:
        app: nginx-pvc
    spec:
      volumes:
        - name: storage-volume
          persistentVolumeClaim:
            claimName: the-nginx-pvc # need to match with the PVC name
      containers:
      - name: nginx-container
        image: nginx
        ports:
          - containerPort: 80
            name: "http-server"
        volumeMounts:
          - name: storage-volume
            mountPath: /usr/share/nginx/html/volume